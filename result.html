<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設計成果 — DECO168</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #111111; --dark: #181818; --card: #1e1e1e;
      --line: #2e2e2e; --gold: #C9A96E; --gold-lt: #e0c99a;
      --white: #ffffff; --muted: #777777; --body: #aaaaaa;
    }
    body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; font-weight: 300; min-height: 100vh; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 68px;
      background: rgba(17,17,17,0.92); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--line); }
    .nav-logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
    .nav-logo .brand { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500; letter-spacing: 4px; color: var(--gold); }
    .nav-logo .sub { font-size: 8px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 3px; }
    .nav-logo .text-block { display: flex; flex-direction: column; }

    /* PROGRESS BAR */
    .progress-bar { position: fixed; top: 68px; left: 0; right: 0; z-index: 99;
      background: var(--dark); border-bottom: 1px solid var(--line);
      padding: 0 48px; display: flex; align-items: center; height: 52px; }
    .step-item { display: flex; align-items: center; gap: 10px;
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); padding: 0 24px; }
    .step-item.done .step-num { background: var(--gold); border-color: var(--gold); color: var(--black); }
    .step-item.active { color: var(--gold); }
    .step-item.active .step-num { border-color: var(--gold); color: var(--gold); }
    .step-num { width: 22px; height: 22px; border: 1px solid var(--line);
      border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0; }
    .step-arrow { color: var(--line); font-size: 12px; }

    /* REPORT HEADER */
    .report-header { margin-top: 120px; background: var(--dark); padding: 28px 48px; border-bottom: 1px solid var(--line); }
    .report-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 400; letter-spacing: 3px; color: var(--white); }
    .report-header h1 em { color: var(--gold); font-style: normal; }
    .report-header .sub { color: var(--muted); margin-top: 5px; font-size: 12px; letter-spacing: 1px; }

    /* META BAR */
    .meta-bar { background: var(--dark); padding: 16px 48px; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: center; gap: 40px; flex-wrap: wrap; }
    .meta-item { display: flex; align-items: center; gap: 8px; }
    .meta-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
    .meta-value { font-size: 13px; color: var(--gold); letter-spacing: 1px; font-family: 'Cormorant Garamond', serif; }
    .meta-sep { color: var(--line); font-size: 16px; }

    /* TABS */
    .tabs { display: flex; background: var(--dark); border-bottom: 1px solid var(--line); padding: 0 48px; overflow-x: auto; }
    .tab { padding: 16px 24px; cursor: pointer; font-size: 12px; letter-spacing: 1px; color: var(--muted);
      border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.2s, border-color 0.2s; white-space: nowrap; }
    .tab:hover { color: var(--body); }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* STYLE PANELS */
    .style-panel { display: none; padding: 40px 48px; }
    .style-panel.active { display: block; }
    .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }

    /* RENDER BOX */
    .render-box img { width: 100%; display: block; }
    .render-ph { width: 100%; aspect-ratio: 4/3; background: var(--dark); border: 1px solid var(--line);
      display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 10px; }
    .render-label { margin-top: 10px; font-size: 11px; color: var(--muted); text-align: center; letter-spacing: 1px; }
    .btn-dl-render { margin-top: 12px; width: 100%; padding: 11px; background: var(--gold); color: #111;
      border: none; font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
    .btn-dl-render:hover { opacity: 0.85; }

    /* ANGLE NAVIGATION */
    .angle-nav { display: flex; align-items: center; justify-content: space-between;
      margin-top: 10px; padding: 6px 0; }
    .angle-arrow { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--line);
      background: transparent; color: var(--gold); font-size: 22px; line-height: 1; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
    .angle-arrow:hover { background: rgba(201,169,110,0.1); border-color: var(--gold); }
    .angle-indicator { flex: 1; text-align: center; }
    .angle-indicator.solo { padding: 6px 0; }
    .angle-name { display: block; font-size: 13px; color: var(--white); font-weight: 500; letter-spacing: 1px; }
    .angle-pos { display: block; font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-top: 2px; }

    /* FURNITURE */
    .furniture-box h3 { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase;
      margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
    .f-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--line); }
    .f-item:last-of-type { border-bottom: none; }
    .f-num { width: 24px; height: 24px; background: var(--gold); color: #111;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 10px; flex-shrink: 0; font-weight: 500; }
    .f-info { flex: 1; min-width: 0; }
    .f-name { font-size: 13px; color: var(--white); margin-bottom: 3px; }
    .f-meta { font-size: 11px; color: var(--muted); }
    .f-dims { font-size: 10px; color: #555; margin-top: 2px; }
    .f-right { text-align: right; flex-shrink: 0; }
    .f-brand { font-size: 9px; background: var(--card); padding: 2px 8px; border: 1px solid var(--line);
      color: var(--muted); letter-spacing: 1px; margin-bottom: 5px; display: inline-block; }
    .f-price { font-size: 15px; color: var(--white); font-family: 'Cormorant Garamond', serif; }
    .buy-btn { display: inline-block; margin-top: 5px; padding: 4px 12px;
      background: var(--gold); color: #111; font-size: 10px; letter-spacing: 1px;
      text-decoration: none; transition: opacity 0.2s; }
    .buy-btn:hover { opacity: 0.8; }
    .total-bar { background: var(--card); border: 1px solid var(--line);
      padding: 14px 20px; margin-top: 20px;
      display: flex; justify-content: space-between; align-items: center; }
    .total-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
    .total-price { font-size: 20px; color: var(--gold); font-family: 'Cormorant Garamond', serif; }

    /* LOADING */
    .loading-msg { padding: 60px 48px; text-align: center; font-size: 13px; color: var(--muted); letter-spacing: 1px; }

    /* DOWNLOADS */
    .downloads-section { padding: 40px 48px; border-top: 1px solid var(--line); }
    .section-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 24px;
      display: flex; align-items: center; gap: 16px; }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--line); }
    .report-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .report-card { border: 1px solid var(--line); padding: 28px 32px; background: var(--card); }
    .report-card-icon { font-size: 22px; color: var(--gold); margin-bottom: 12px; opacity: 0.8; }
    .report-card-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--white); margin-bottom: 6px; }
    .report-card-desc { font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 20px; }
    .btn-download { display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border: 1px solid var(--gold);
      background: none; color: var(--gold); font-size: 11px; letter-spacing: 1.5px;
      text-transform: uppercase; cursor: pointer; text-decoration: none;
      transition: background 0.2s, color 0.2s; font-family: 'Inter', sans-serif; }
    .btn-download:hover { background: var(--gold); color: var(--black); }

    /* FAB */
    .fab-dl { position: fixed; bottom: 28px; right: 28px; z-index: 9999;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px; background: rgba(17,17,17,0.92);
      border: 1px solid var(--gold); color: var(--gold);
      text-decoration: none; font-family: 'Inter', sans-serif;
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      backdrop-filter: blur(12px); transition: background 0.2s, color 0.2s; }
    .fab-dl:hover { background: var(--gold); color: #111; }

    @media (max-width: 900px) {
      nav { padding: 0 20px; }
      .progress-bar { padding: 0 12px; overflow-x: auto; }
      .step-item { padding: 0 10px; font-size: 9px; white-space: nowrap; }
      .report-header { padding: 20px; }
      .meta-bar { padding: 0 20px; }
      .tabs { padding: 0 20px; }
      .style-panel { padding: 24px 20px; }
      .panel-grid { grid-template-columns: 1fr; }
      .downloads-section { padding: 24px 20px; }
      .report-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <svg width="32" height="24" viewBox="0 0 110 80" fill="none">
      <path d="M8 12 L8 68 L30 68 C48 68 60 57 60 40 C60 23 48 12 30 12 Z" fill="none" stroke="#C9A96E" stroke-width="2.5"/>
      <path d="M102 12 L102 68 L80 68 C62 68 50 57 50 40 C50 23 62 12 80 12 Z" fill="none" stroke="#C9A96E" stroke-width="2.5"/>
    </svg>
    <div class="text-block">
      <span class="brand">DECO168</span>
      <span class="sub">Design & Deco · ATARAPA™</span>
    </div>
  </a>
</nav>

<div class="progress-bar">
  <div class="step-item done"><div class="step-num">✓</div>上傳空間</div>
  <div class="step-arrow">›</div>
  <div class="step-item done"><div class="step-num">✓</div>設計偏好</div>
  <div class="step-arrow">›</div>
  <div class="step-item done"><div class="step-num">✓</div>付款完成</div>
  <div class="step-arrow">›</div>
  <div class="step-item done"><div class="step-num">✓</div>生成中</div>
  <div class="step-arrow">›</div>
  <div class="step-item active"><div class="step-num">5</div>取得成品</div>
</div>

<div class="report-header">
  <h1><em>設計分析報告</em></h1>
  <div class="sub">個人化空間設計方案</div>
</div>

<div class="meta-bar">
  <div class="meta-item">
    <span class="meta-label">方案</span>
    <span class="meta-value" id="metaPlan">—</span>
  </div>
  <div class="meta-sep">·</div>
  <div class="meta-item">
    <span class="meta-label">訂單編號</span>
    <span class="meta-value" id="metaOrderId">—</span>
  </div>
  <div class="meta-sep">·</div>
  <div class="meta-item">
    <span class="meta-label">付款日期</span>
    <span class="meta-value" id="metaDate">—</span>
  </div>
</div>

<div id="tabsContainer"><div class="loading-msg">載入設計成果中…</div></div>
<div id="panelsContainer"></div>

<div class="downloads-section">
  <div class="section-label">報告下載</div>
  <div class="report-row">
    <div class="report-card">
      <div class="report-card-icon">📄</div>
      <div class="report-card-title">風格定位報告</div>
      <div class="report-card-desc">空間格局分析、色彩系統建議、設計邏輯說明，以及建材與燈光選配方向。</div>
      <a class="btn-download" href="#" onclick="handleDownload(event,'style')">↓ &nbsp;下載 PDF 報告</a>
    </div>
    <div class="report-card">
      <div class="report-card-icon">🪵</div>
      <div class="report-card-title">材料建議清單</div>
      <div class="report-card-desc">依你的坪數與風格偏好，列出建材品牌、型號、價格區間與推薦採購管道。</div>
      <a class="btn-download" href="#" onclick="handleDownload(event,'material')">↓ &nbsp;下載材料清單</a>
    </div>
  </div>
</div>

<a href="download.html" class="fab-dl" title="查詢 / 下載訂單">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
    <polyline points="7 10 12 15 17 10"/>
    <line x1="12" y1="15" x2="12" y2="3"/>
  </svg>
  <span>查詢下載</span>
</a>

<script>
  var API_BASE = 'https://deco168-production.up.railway.app';
  var _params  = new URLSearchParams(window.location.search);
  var JOB_ID   = _params.get('job') || localStorage.getItem('deco_job_id');

  (function guard() {
    if (!localStorage.getItem('deco_order_id') && !_params.get('job')) {
      window.location.href = 'index.html';
    }
  })();

  (function fillMeta() {
    var orderId   = localStorage.getItem('deco_order_id') || (_params.get('job') ? 'ORD-' + _params.get('job') : '—');
    var plan      = localStorage.getItem('deco_plan') || 'A';
    var orderTime = localStorage.getItem('deco_order_time');
    var planLabel = plan === 'B' ? '方案 B（含設計師審核）' : '方案 A（概念渲染）';
    var timeStr   = '';
    if (orderTime) {
      var d = new Date(parseInt(orderTime, 10));
      timeStr = d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate();
    }
    document.getElementById('metaOrderId').textContent = orderId;
    document.getElementById('metaPlan').textContent    = planLabel;
    document.getElementById('metaDate').textContent    = timeStr || '—';
  })();

  // ── 把所有 renders 依 style 分組（同 style 內為角度陣列）──
  var _groups = [];     // [{style, label, angles: [render, render, ...]}]
  var _angleIdx = {};   // 每個 style 目前正在看的角度 index

  function buildUI(renders) {
    _groups = [];
    _angleIdx = {};
    var byStyle = {};
    renders.forEach(function(r) {
      var key = r.style || 'unknown';
      if (!byStyle[key]) {
        byStyle[key] = { style: key, label: r.style_label || key, angles: [] };
        _groups.push(byStyle[key]);
        _angleIdx[key] = 0;
      }
      byStyle[key].angles.push(r);
    });

    // TABS：每個風格 1 個 tab
    var tabsHtml = _groups.map(function(g, i) {
      return '<div class="tab' + (i === 0 ? ' active' : '') + '" onclick="switchStyle(\'' + g.style + '\',this)">' +
             g.label + '</div>';
    }).join('');
    document.getElementById('tabsContainer').innerHTML = '<div class="tabs">' + tabsHtml + '</div>';

    // PANELS：每個 style 一個 panel，內含 1 張當前角度圖 + 左右切換
    var panelsHtml = _groups.map(function(g, i) {
      return '<div class="style-panel' + (i === 0 ? ' active' : '') + '" id="panel-' + g.style + '">' +
             renderPanelContent(g) +
             '</div>';
    }).join('');
    document.getElementById('panelsContainer').innerHTML = panelsHtml;
  }

  function renderPanelContent(group) {
    var idx = _angleIdx[group.style] || 0;
    var r   = group.angles[idx] || {};
    var imgUrl = r.render_url || (r.render_filename && JOB_ID
      ? API_BASE + '/jobs/' + JOB_ID + '/' + r.render_filename : null);
    var label    = group.label;
    var angleLbl = r.angle_label || ('角度 ' + (idx+1));
    var furn     = r.matched_furniture || [];
    var total    = furn.reduce(function(s, f) { return s + (f.price_twd || 0); }, 0);
    var nAngles  = group.angles.length;

    // 左右切換 + 角度指示
    var navHtml = nAngles > 1
      ? '<div class="angle-nav">' +
          '<button class="angle-arrow" onclick="prevAngle(\'' + group.style + '\')">‹</button>' +
          '<div class="angle-indicator">' +
            '<span class="angle-name">' + angleLbl + '</span>' +
            '<span class="angle-pos">' + (idx+1) + ' / ' + nAngles + '</span>' +
          '</div>' +
          '<button class="angle-arrow" onclick="nextAngle(\'' + group.style + '\')">›</button>' +
        '</div>'
      : '<div class="angle-indicator solo"><span class="angle-name">' + angleLbl + '</span></div>';

    var imgSection = imgUrl
      ? '<img src="' + imgUrl + '" alt="' + label + '" loading="lazy">' +
        navHtml +
        '<div class="render-label">' + label + ' · ' + angleLbl + '</div>' +
        '<button class="btn-dl-render" onclick="dlImg(\'' + imgUrl.replace(/'/g,"\\'") + '\',\'' + (label + '_' + angleLbl).replace(/'/g,"\\'") + '\')">↓ &nbsp;下載此渲染圖</button>'
      : '<div class="render-ph"><div style="font-size:28px;color:var(--gold);opacity:0.3;">◈</div>' +
        '<div style="font-size:11px;color:var(--muted);letter-spacing:2px;">生成中</div></div>' +
        navHtml +
        '<div class="render-label">' + label + ' · ' + angleLbl + '</div>';

    var furnItems = furn.length
      ? furn.map(function(f, j) {
          var price   = f.price_twd ? 'NT$' + Number(f.price_twd).toLocaleString() : '—';
          var rawUrl = f.purchase_url || f.link || '';
          if (rawUrl.includes('google.com/search')) {
            var m = rawUrl.match(/q=IKEA\+([^&+]+)/);
            rawUrl = m ? 'https://www.ikea.com.tw/zh/search/?query=' + m[1] : 'https://www.ikea.com.tw';
          }
          var linkBtn = rawUrl
            ? '<a href="' + rawUrl + '" target="_blank" rel="noopener" class="buy-btn">前往購買</a>'
            : '';
          return '<div class="f-item">' +
            '<div class="f-num">' + (j+1) + '</div>' +
            '<div class="f-info">' +
              '<div class="f-name">' + (f.name_zh || f.name || '') + '</div>' +
              '<div class="f-meta">' + (f.category || '') + (f.color ? ' · ' + f.color : '') + '</div>' +
              (f.dimensions ? '<div class="f-dims">' + f.dimensions + '</div>' : '') +
            '</div>' +
            '<div class="f-right">' +
              '<div class="f-brand">' + (f.brand || '—') + '</div>' +
              '<div class="f-price">' + price + '</div>' +
              linkBtn +
            '</div></div>';
        }).join('') +
        (total > 0
          ? '<div class="total-bar"><div class="total-label">傢俱小計（' + furn.length + '件）</div>' +
            '<div class="total-price">NT$' + total.toLocaleString() + '</div></div>'
          : '')
      : '<p style="font-size:12px;color:var(--muted);padding:20px 0;">傢俱清單生成中…</p>';

    return '<div class="panel-grid">' +
           '<div class="render-box">' + imgSection + '</div>' +
           '<div class="furniture-box"><h3>推薦傢俱清單</h3>' + furnItems + '</div>' +
           '</div>';
  }

  function switchStyle(style, el) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.style-panel').forEach(function(p) { p.classList.remove('active'); });
    if (el) el.classList.add('active');
    var panel = document.getElementById('panel-' + style);
    if (panel) panel.classList.add('active');
  }

  function prevAngle(style) {
    var g = _groups.find(function(x) { return x.style === style; });
    if (!g) return;
    var i = (_angleIdx[style] || 0) - 1;
    if (i < 0) i = g.angles.length - 1;
    _angleIdx[style] = i;
    var panel = document.getElementById('panel-' + style);
    if (panel) panel.innerHTML = renderPanelContent(g);
  }
  function nextAngle(style) {
    var g = _groups.find(function(x) { return x.style === style; });
    if (!g) return;
    var i = ((_angleIdx[style] || 0) + 1) % g.angles.length;
    _angleIdx[style] = i;
    var panel = document.getElementById('panel-' + style);
    if (panel) panel.innerHTML = renderPanelContent(g);
  }

  function dlImg(url, name) {
    fetch(url)
      .then(function(r) { return r.blob(); })
      .then(function(blob) {
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = (name || 'render') + '.jpg';
        a.click();
        URL.revokeObjectURL(a.href);
      })
      .catch(function() { window.open(url, '_blank'); });
  }

  function handleDownload(e, type) {
    e.preventDefault();
    alert(type === 'style' ? '風格報告將在生成完整後提供下載。' : '材料清單將在生成完整後提供下載。');
  }

  var _demoRenders = [
    { style: 'modern',   style_label: '現代簡約', render_url: null, matched_furniture: [] },
    { style: 'japanese', style_label: '日式侘寂', render_url: null, matched_furniture: [] },
    { style: 'luxury',   style_label: '輕奢過渡', render_url: null, matched_furniture: [] },
  ];

  function loadResult() {
    if (!JOB_ID) { buildUI(_demoRenders); return; }
    fetch(API_BASE + '/api/job/' + JOB_ID + '/result')
      .then(function(r) {
        if (r.status === 202) return r.json().then(function(d) { throw new Error('pending:' + (d.status && d.status.status || 'processing')); });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function(data) {
        var renders = data.renders || [];
        if (renders.length) { buildUI(renders); }
        else { document.getElementById('tabsContainer').innerHTML = '<div class="loading-msg">尚無渲染圖</div>'; }
      })
      .catch(function(e) {
        var msg = e.message || '';
        if (msg.startsWith('pending:')) {
          document.getElementById('tabsContainer').innerHTML =
            '<div class="loading-msg">仍在處理中（' + msg.split(':')[1] + '）<br>請稍後再重新整理頁面。</div>';
        } else {
          buildUI(_demoRenders);
        }
      });
  }

  loadResult();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>處理中 — 空間提案所</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #111111; --dark: #181818; --card: #1e1e1e;
      --line: #2e2e2e; --gold: #C9A96E; --gold-lt: #e0c99a;
      --white: #ffffff; --muted: #777777; --body: #aaaaaa;
    }

    body {
      background: var(--black); color: var(--white);
      font-family: 'Inter', sans-serif; font-weight: 300;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    /* NAV */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 68px;
      border-bottom: 1px solid var(--line); flex-shrink: 0;
    }
    .nav-logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
    .nav-logo .brand { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 500; letter-spacing: 4px; color: var(--gold); }
    .nav-logo .sub { font-size: 8px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 3px; }
    .nav-logo .text-block { display: flex; flex-direction: column; }

    /* PROGRESS */
    .progress-bar {
      background: var(--dark); border-bottom: 1px solid var(--line);
      padding: 0 48px; display: flex; align-items: center; height: 52px; flex-shrink: 0;
    }
    .step-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--muted); padding: 0 24px;
    }
    .step-item.active { color: var(--gold); }
    .step-item.done  { color: var(--muted); }
    .step-num {
      width: 22px; height: 22px; border: 1px solid var(--line);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 9px; flex-shrink: 0;
    }
    .step-item.active .step-num { border-color: var(--gold); color: var(--gold); }
    .step-item.done  .step-num  { background: var(--gold); border-color: var(--gold); color: var(--black); }
    .step-arrow { color: var(--line); font-size: 12px; }

    /* CENTER STAGE */
    .stage {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 24px; text-align: center;
    }

    /* ANIMATED ORB */
    .orb-wrap { position: relative; width: 160px; height: 160px; margin-bottom: 48px; }
    .orb {
      width: 160px; height: 160px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(201,169,110,0.25), transparent 70%);
      border: 1px solid rgba(201,169,110,0.3);
      animation: pulse 3s ease-in-out infinite;
      position: relative;
    }
    .orb::before {
      content: ''; position: absolute; inset: 12px; border-radius: 50%;
      border: 1px solid rgba(201,169,110,0.15);
      animation: pulse 3s ease-in-out infinite 0.5s;
    }
    .orb::after {
      content: ''; position: absolute; inset: 28px; border-radius: 50%;
      border: 1px solid rgba(201,169,110,0.08);
      animation: pulse 3s ease-in-out infinite 1s;
    }
    .orb-inner {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      opacity: 0.9;
      display: flex; align-items: center; justify-content: center;
    }
    .orb-logo {
      animation: logoSpin 12s linear infinite reverse;
      filter: drop-shadow(0 0 6px rgba(201,169,110,0.4));
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.04); opacity: 0.7; }
    }
    @keyframes logoSpin { to { transform: rotate(360deg); } }
    .ring {
      position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px;
      border-radius: 50%; border: 1px dashed rgba(201,169,110,0.2);
      animation: spin 20s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .stage-eyebrow {
      font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .stage-eyebrow::before, .stage-eyebrow::after {
      content: ''; flex: 1; max-width: 40px; height: 1px; background: rgba(201,169,110,0.4);
    }
    .stage-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px; font-weight: 300; color: var(--white);
      margin-bottom: 12px; line-height: 1.15;
    }
    .stage-title em { color: var(--gold); font-style: italic; }
    .stage-desc { font-size: 13px; color: var(--body); line-height: 1.8; max-width: 440px; margin-bottom: 48px; }

    /* PROCESSING STEPS */
    .proc-steps {
      display: flex; flex-direction: column;
      width: 100%; max-width: 440px; margin-bottom: 32px; text-align: left;
    }
    .proc-step {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 0; border-bottom: 1px solid var(--line);
      font-size: 12px; color: var(--muted); transition: color 0.4s;
    }
    .proc-step:last-child { border-bottom: none; }
    .proc-step.done  { color: var(--body); }
    .proc-step.active { color: var(--white); }
    .proc-step-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--line); flex-shrink: 0; transition: background 0.4s;
    }
    .proc-step.done  .proc-step-dot { background: var(--gold); }
    .proc-step.active .proc-step-dot {
      background: var(--gold);
      box-shadow: 0 0 0 4px rgba(201,169,110,0.2);
      animation: dotPulse 1.5s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%, 100% { box-shadow: 0 0 0 4px rgba(201,169,110,0.2); }
      50%       { box-shadow: 0 0 0 8px rgba(201,169,110,0.08); }
    }
    .proc-step-text { flex: 1; }
    .proc-step-check { color: var(--gold); font-size: 11px; opacity: 0; transition: opacity 0.4s; }
    .proc-step.done .proc-step-check { opacity: 1; }

    .timer-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--muted); margin-bottom: 28px;
    }
    .timer-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: dotPulse 1.5s ease-in-out infinite; }

    .email-note {
      background: var(--card); border: 1px solid var(--line);
      padding: 16px 24px; max-width: 440px; width: 100%;
      font-size: 12px; color: var(--muted); line-height: 1.7; text-align: left;
    }
    .email-note strong { color: var(--body); }

    @media (max-width: 768px) {
      nav { padding: 0 20px; }
      .progress-bar { padding: 0 12px; overflow-x: auto; }
      .step-item { padding: 0 10px; font-size: 9px; white-space: nowrap; }
      .orb-wrap { width: 120px; height: 120px; }
      .orb { width: 120px; height: 120px; }
      .stage-title { font-size: 28px; }
    }

    /* FAB — 查詢下載 */
    .fab-dl {
      position: fixed; bottom: 28px; right: 28px; z-index: 9999;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px; background: rgba(17,17,17,0.92);
      border: 1px solid var(--gold); color: var(--gold);
      text-decoration: none; font-family: 'Inter', sans-serif;
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      backdrop-filter: blur(12px); transition: background 0.2s, color 0.2s;
    }
    .fab-dl:hover { background: var(--gold); color: #111; }

    /* 手機滑動效能：fixed 元素的 backdrop-filter 每一幀都要重算背後內容的模糊，
       是中低階手機滑動卡頓主因；手機停用並加深底色補償，桌面維持毛玻璃視覺 */
    @media (max-width: 768px) {
      nav, .fab-dl {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        background: rgba(17,17,17,0.97);
      }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <svg width="32" height="24" viewBox="0 0 110 80" fill="none">
      <path d="M8 12 L8 68 L30 68 C48 68 60 57 60 40 C60 23 48 12 30 12 Z" fill="none" stroke="#C9A96E" stroke-width="2.5"/>
      <path d="M102 12 L102 68 L80 68 C62 68 50 57 50 40 C50 23 62 12 80 12 Z" fill="none" stroke="#C9A96E" stroke-width="2.5"/>
    </svg>
    <div class="text-block">
      <span class="brand">DECO168</span>
      <span class="sub">Design & Deco · ATARAPA™</span>
    </div>
  </a>
</nav>

<div class="progress-bar">
  <div class="step-item done"><div class="step-num">✓</div>上傳空間</div>
  <div class="step-arrow">›</div>
  <div class="step-item done"><div class="step-num">✓</div>設計偏好</div>
  <div class="step-arrow">›</div>
  <div class="step-item done"><div class="step-num">✓</div>付款完成</div>
  <div class="step-arrow">›</div>
  <div class="step-item active"><div class="step-num">4</div>生成中</div>
  <div class="step-arrow">›</div>
  <div class="step-item"><div class="step-num">5</div>取得成品</div>
</div>

<div class="stage">
  <div class="orb-wrap">
    <div class="ring"></div>
    <div class="orb">
      <div class="orb-inner">
        <svg class="orb-logo" width="76" height="56" viewBox="0 0 110 80" fill="none">
          <path d="M8 12 L8 68 L30 68 C48 68 60 57 60 40 C60 23 48 12 30 12 Z" fill="none" stroke="#C9A96E" stroke-width="2.5"/>
          <path d="M102 12 L102 68 L80 68 C62 68 50 57 50 40 C50 23 62 12 80 12 Z" fill="none" stroke="#C9A96E" stroke-width="2.5"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="stage-eyebrow">正在整理你的提案</div>
  <h1 class="stage-title">為你打造<em>專屬</em><br>風格提案</h1>
  <p class="stage-desc"><b style="color:var(--gold,#C9A96E);">約 5–15 分鐘，可先關閉視窗，稍後再回來查看。</b></p>

  <div class="proc-steps" id="procSteps">
    <div class="proc-step done" id="step1">
      <div class="proc-step-dot"></div>
      <div class="proc-step-text">訂單已成立</div>
      <div class="proc-step-check">✓</div>
    </div>
    <div class="proc-step active" id="step2">
      <div class="proc-step-dot"></div>
      <div class="proc-step-text">空間理解 — 解析照片與影片</div>
      <div class="proc-step-check">✓</div>
    </div>
    <div class="proc-step" id="step3">
      <div class="proc-step-dot"></div>
      <div class="proc-step-text">風格定位與設計方向</div>
      <div class="proc-step-check">✓</div>
    </div>
    <div class="proc-step" id="step4">
      <div class="proc-step-dot"></div>
      <div class="proc-step-text">設計提案中</div>
      <div class="proc-step-check">✓</div>
    </div>
    <div class="proc-step" id="step5">
      <div class="proc-step-dot"></div>
      <div class="proc-step-text">家具與軟裝搭配</div>
      <div class="proc-step-check">✓</div>
    </div>
  </div>

  <div class="timer-row">
    <div class="timer-dot"></div>
    <span id="timerText">正在解析你的照片與空間格局</span>
  </div>

  <div class="email-note">
    <strong>請記下你的訂單編號，完成後可在「查詢下載」頁面取得設計成果。</strong><br>
    <div style="display:flex;align-items:center;gap:14px;margin:12px 0;">
      <span style="font-size:22px;letter-spacing:4px;color:var(--gold,#c9a96e);font-family:monospace;" id="displayJobId"></span>
      <button id="copyBtn" onclick="copyJobId()"
        style="background:none;border:1px solid var(--gold,#c9a96e);color:var(--gold,#c9a96e);
               font-family:'Inter',sans-serif;font-size:10px;letter-spacing:2px;
               padding:6px 14px;cursor:pointer;flex-shrink:0;transition:background 0.2s,color 0.2s;">
        複製編號
      </button>
    </div>
    <span style="font-size:11px;color:var(--muted,#888);">前往 deco168.vercel.app → 查詢下載 → 輸入此編號</span>
  </div>
</div>

<script>
  (function guard() {
    if (!localStorage.getItem('deco_order_id')) {
      window.location.href = 'index.html';
    }
  })();

  var API_BASE = 'https://deco168-production.up.railway.app';
  var PUBLIC_WEB_BASE = 'https://deco168.vercel.app';
  var JOB_ID   = localStorage.getItem('deco_job_id');
  if (JOB_ID) {
    var el = document.getElementById('displayJobId');
    if (el) el.textContent = JOB_ID;
  }

  function copyJobId() {
    var id = JOB_ID || '';
    if (!id) return;
    navigator.clipboard.writeText(id).then(function() {
      var btn = document.getElementById('copyBtn');
      btn.textContent = '已複製 ✓';
      btn.style.background = 'var(--gold,#c9a96e)';
      btn.style.color = '#111';
      setTimeout(function() {
        btn.textContent = '複製編號';
        btn.style.background = 'none';
        btn.style.color = 'var(--gold,#c9a96e)';
      }, 2000);
    });
  }

  // status → which step number is currently active
  var STATUS_STEP = {
    'queued':    2,
    'analyzing': 2,
    'matching':  3,
    'rendering': 4,
    'completed': 5,
    'failed':    2
  };

  // 動態文字跟著「實際當前步驟」走，避免與上方步驟亮點不符（#9）。
  var STEP_MSG = {
    2: '正在解析你的照片與空間格局',
    3: '正在定位風格與配色方向',
    4: '正在繪製你的設計提案',
    5: '正在搭配家具與軟裝'
  };
  function updateSteps(cur) {
    for (var i = 1; i <= 5; i++) {
      var el = document.getElementById('step' + i);
      if (!el) continue;
      if (i < cur)      el.className = 'proc-step done';
      else if (i === cur) el.className = 'proc-step active';
      else               el.className = 'proc-step';
    }
    var tt = document.getElementById('timerText');
    if (tt && STEP_MSG[cur]) tt.textContent = STEP_MSG[cur];
  }

  var pollTimer;

  // timerText 改為跟著實際步驟（updateSteps 設定），不再獨立輪播 → 不會與步驟亮點脫節。
  function startRotate() {}
  function stopRotate() {}

  function poll() {
    fetch(API_BASE + '/api/job/' + JOB_ID)
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(data) {
        if (!data) return;
        var step = STATUS_STEP[data.status] || 2;
        updateSteps(step);
        // status 進入 completed / failed 才覆蓋輪播；其餘狀態維持服務感文案
        if (data.status === 'completed') {
          stopRotate();
          clearInterval(pollTimer);
          updateSteps(5);
          document.getElementById('step5').className = 'proc-step done';
          document.getElementById('timerText').textContent = '提案完成，正在為你打開設計頁…';
          setTimeout(function() {
            window.location.href = PUBLIC_WEB_BASE + '/result?job=' + encodeURIComponent(JOB_ID);
          }, 1500);
        } else if (data.status === 'failed') {
          stopRotate();
          clearInterval(pollTimer);
          document.getElementById('timerText').textContent = '處理遇到問題，請聯絡客服';
        }
      })
      .catch(function() {});  // silently retry
  }

  if (JOB_ID) {
    // Real mode: 啟動輪播 + 每 3 秒 polling
    startRotate();
    poll();
    pollTimer = setInterval(poll, 3000);
  } else {
    // Demo mode (no job_id): 輪播 + 假動畫
    startRotate();
    var steps  = ['step2','step3','step4','step5'];
    var delays = [2500, 5500, 9000, 13000];
    steps.forEach(function(id, i) {
      setTimeout(function() {
        if (i > 0) document.getElementById(steps[i-1]).className = 'proc-step done';
        document.getElementById(id).className = 'proc-step active';
      }, delays[i]);
    });
    setTimeout(function() {
      stopRotate();
      document.getElementById('step5').className = 'proc-step done';
      document.getElementById('timerText').textContent = '提案完成，正在為你打開設計頁…';
      setTimeout(function() {
        window.location.href = PUBLIC_WEB_BASE + '/result?job=' + encodeURIComponent(JOB_ID || 'DEMO');
      }, 1200);
    }, 15000);
  }
</script>

<a href="download.html" class="fab-dl" title="查詢 / 下載訂單">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
    <polyline points="7 10 12 15 17 10"/>
    <line x1="12" y1="15" x2="12" y2="3"/>
  </svg>
  <span>查詢下載</span>
</a>
</body>
</html>
